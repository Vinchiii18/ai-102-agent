<!doctype html>
<html>
  <head>
    <title>AI-102 Agent</title>
    <style>
      body {
        font-family: Arial;
        max-width: 800px;
        margin: auto;
        padding: 20px;
      }

      textarea {
        width: 100%;
        height: 100px;
      }

      button {
        margin-top: 10px;
        padding: 10px;
      }

      #answer {
        margin-top: 20px;
        white-space: pre-wrap;
        background: #f4f4f4;
        padding: 10px;
      }
    </style>
  </head>

  <body>
    <h2>AI-102 Study Agent</h2>

    <textarea id="question" placeholder="Ask AI-102 question..."></textarea>
    <br />
    <button onclick="ask()">Ask</button>

    <div id="answer"></div>

    <script>
      async function ask() {
        const question = document.getElementById("question").value;

        document.getElementById("answer").innerText = "Thinking...";

        const res = await fetch("http://localhost:3000/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question }),
        });

        const data = await res.json();

        document.getElementById("answer").innerText = data.answer;
      }
    </script>
  </body>
</html>
